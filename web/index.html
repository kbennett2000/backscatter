<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>backscatter</title>
    <!-- MapLibre GL JS — open source, no token / no signup. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <!-- Basemap/theme logic + no-FOUC guard: set data-theme BEFORE the stylesheet paints,
         so a dark-mode user never flashes light. Same resolver app.js uses (theme.js). -->
    <script src="/static/theme.js"></script>
    <script>
      (function () {
        try {
          var stored =
            localStorage.getItem("backscatter.basemap") ||
            localStorage.getItem("backscatter.theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = chromeFor(
            resolveInitialBasemap(stored, prefersDark),
          );
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="map"></div>
    <div id="readout">loading…</div>
    <div id="status" role="button" tabindex="0"
      title="Jump to the latest frame" aria-label="Jump to the latest frame" hidden></div>
    <div id="statepanel" hidden>
      <h2 id="sp-title"></h2>
      <p id="sp-body"></p>
      <button id="sp-action" type="button" hidden></button>
      <button id="sp-backfill" type="button" hidden></button>
      <div id="sp-progress" hidden>
        <div id="sp-progress-text"></div>
        <div id="sp-progress-bar"><div id="sp-progress-fill"></div></div>
      </div>
      <div id="sp-error" hidden></div>
    </div>
    <div id="rangebar" hidden>
      <span id="locwrap" hidden>
        <span class="muted">location:</span>
        <select id="location" aria-label="Active location"></select>
      </span>
      <button id="manage" type="button">⚙ <span class="btnlabel">Locations</span></button>
      <button id="theme" type="button" title="Toggle light/dark" aria-label="Toggle light/dark"></button>
      <button id="wintoggle" type="button" title="Time window" aria-label="Time window">🕘 Window</button>
      <!-- display:contents on desktop (flows inline into #rangebar); a drawer on mobile. -->
      <div id="windowctl">
        <span class="muted wintitle">window:</span>
        <input id="start" type="datetime-local" />
        <span class="muted">→</span>
        <input id="end" type="datetime-local" />
        <button id="load" type="button">Load</button>
        <button class="preset" data-hours="6" type="button">6h</button>
        <button class="preset" data-hours="24" type="button">24h</button>
        <button id="latest" type="button">Latest</button>
        <span id="extent" class="muted"></span>
      </div>
    </div>
    <div id="locpanel" hidden>
      <h3>Locations</h3>
      <div id="loclist"></div>
      <form id="locform">
        <div id="formtitle">Add location</div>
        <input id="lf-name" placeholder="name" autocomplete="off" />
        <input id="lf-lat" type="number" step="any" placeholder="lat" />
        <input id="lf-lon" type="number" step="any" placeholder="lon" />
        <label><input id="lf-default" type="checkbox" /> default</label>
        <button id="lf-pick" type="button">📍 pick on map</button>
        <button id="lf-save" type="submit">Add</button>
        <button id="lf-reset" type="button">Clear</button>
        <div id="locerror" class="err"></div>
      </form>
      <div id="displaysettings">
        <h3>Display</h3>
        <label class="setting"
          ><span>Map style</span>
          <select id="basemap" aria-label="Map style"></select
        ></label>
        <label class="setting"
          ><span>Radar opacity</span>
          <input id="opacity" type="range" min="0.1" max="1" step="0.05"
        /></label>
        <label class="setting"
          ><span>Palette</span>
          <select id="palette" aria-label="Reflectivity color palette">
            <option value="nws">NWS classic</option>
            <option value="radarscope">RadarScope</option>
          </select
        ></label>
        <label class="setting"
          ><span>Hide clear-air</span>
          <input id="clearair" type="checkbox"
            aria-label="Hide low-dBZ clear-air returns (bugs, dust, gradients)"
        /></label>
        <label class="setting"
          ><span>Storm tracks</span>
          <input id="tracks" type="checkbox"
            aria-label="Show estimated storm-cell markers and motion vectors"
        /></label>
        <p class="setting-note">
          Estimated cell motion — not a nowcast, not for life safety.
        </p>
      </div>
    </div>
    <div id="timeline" hidden>
      <button id="play" type="button" aria-label="Play/pause">▶</button>
      <div id="scrubwrap">
        <div id="gaptrack" aria-hidden="true"></div>
        <input id="scrubber" type="range" min="0" max="0" value="0" step="1" />
      </div>
      <span id="gapflag" hidden></span>
      <span id="frametime">—</span>
      <select id="speed" aria-label="Playback speed">
        <option value="1000">1 fps</option>
        <option value="500" selected>2 fps</option>
        <option value="250">4 fps</option>
        <option value="125">8 fps</option>
      </select>
    </div>
    <div id="credit">
      Radar: NOAA NEXRAD Level 2 (not endorsed by NOAA/NWS) ·
      Basemap © OpenMapTiles © OpenStreetMap contributors via OpenFreeMap
    </div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="/static/gaps.js"></script>
    <script src="/static/markers.js"></script>
    <script src="/static/firstrun.js"></script>
    <script src="/static/backfill.js"></script>
    <script src="/static/layout.js"></script>
    <script src="/static/timefmt.js"></script>
    <script src="/static/prefs.js"></script>
    <script src="/static/stormtracks.js"></script>
    <script src="/static/recolor.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
